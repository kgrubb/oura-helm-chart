{{- if and (eq .Values.auth.mode "oauth") .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "oura.tokenPvcName" . }}
  labels:
    {{- include "oura.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
  annotations:
    # Keep OAuth token across helm uninstall/reinstall (k3s failurePolicy=reinstall).
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
