{{- if .Values.backfill.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-backfill" (include "oura.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "oura.labels" . | nindent 4 }}
    app.kubernetes.io/component: backfill
  annotations:
    description: "One-shot historical backfill; delete/recreate to re-run"
spec:
  ttlSecondsAfterFinished: {{ .Values.backfill.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.backfill.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "oura.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backfill
    spec:
      restartPolicy: Never
      containers:
        - name: backfill
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - uv
            - run
            - --with
            - psycopg[binary]==3.2.9
            - python
            - /config/collector.py
          env:
            - name: BACKFILL
              value: "1"
            - name: START_DATE
              value: {{ .Values.backfill.startDate | quote }}
            {{- include "oura.collectorEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.backfill.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if eq .Values.auth.mode "oauth" }}
            - name: token
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "oura.configMapName" . }}
            defaultMode: 0444
        {{- if eq .Values.auth.mode "oauth" }}
        - name: token
          persistentVolumeClaim:
            claimName: {{ include "oura.tokenPvcName" . }}
        {{- end }}
{{- end }}
