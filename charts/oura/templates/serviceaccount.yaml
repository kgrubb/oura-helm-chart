{{- if .Values.serviceAccount.create -}}
{{- $bootstrapHook := eq (include "oura.bootstrapEnabled" .) "true" -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "oura.serviceAccountName" . }}
  labels:
    {{- include "oura.labels" . | nindent 4 }}
  {{- if or $bootstrapHook .Values.serviceAccount.annotations }}
  annotations:
    {{- if $bootstrapHook }}
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-15"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
