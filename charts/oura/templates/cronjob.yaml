apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "oura.fullname" . }}
  labels:
    {{- include "oura.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  schedule: {{ .Values.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      template:
        metadata:
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            {{- include "oura.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: collector
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          restartPolicy: Never
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: collector
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - uv
                - run
                - --with
                - psycopg[binary]==3.2.9
                - python
                - /config/collector.py
              env:
                {{- include "oura.collectorEnv" . | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                {{- if eq .Values.auth.mode "oauth" }}
                - name: token
                  mountPath: {{ .Values.persistence.mountPath }}
                {{- end }}
          volumes:
            - name: config
              configMap:
                name: {{ include "oura.configMapName" . }}
                defaultMode: 0444
            {{- if eq .Values.auth.mode "oauth" }}
            - name: token
              persistentVolumeClaim:
                claimName: {{ include "oura.tokenPvcName" . }}
            {{- end }}
