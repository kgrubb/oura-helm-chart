{{- if and (eq (include "oura.dashboardEnabled" .) "true") (eq (include "oura.createDatasource" .) "true") }}
{{- $user := include "oura.dashboardDatasourceUser" . -}}
{{- $password := include "oura.dashboardDatasourcePassword" . -}}
{{- if not $password -}}
{{- fail "dashboard.createDatasource requires dashboard.datasource.password when postgres.existingSecret is set (or use postgres.password / passwordRo so the chart creates the DB Secret)" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-grafana-datasource" (include "oura.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "oura.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-datasource
    {{- range $k, $v := .Values.dashboard.datasource.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
type: Opaque
stringData:
  {{ .Values.dashboard.datasourceUid }}.yaml: |
    apiVersion: 1
    datasources:
      - name: {{ .Values.dashboard.datasource.name | quote }}
        uid: {{ .Values.dashboard.datasourceUid | quote }}
        type: grafana-postgresql-datasource
        access: proxy
        url: {{ printf "%s:%v" .Values.postgres.host .Values.postgres.port | quote }}
        user: {{ $user | quote }}
        isDefault: false
        editable: false
        jsonData:
          database: {{ .Values.postgres.database | quote }}
          sslmode: {{ .Values.dashboard.datasource.sslMode | quote }}
          postgresVersion: {{ .Values.dashboard.datasource.postgresVersion }}
          timescaledb: false
        secureJsonData:
          password: {{ $password | quote }}
{{- end }}
