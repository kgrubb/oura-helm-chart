# Container image. uv installs psycopg at job start (no custom image required).
image:
  repository: ghcr.io/astral-sh/uv
  tag: python3.12-alpine
  pullPolicy: IfNotPresent

schedule: "0 */6 * * *"
timeZone: UTC
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 2
failedJobsHistoryLimit: 3
activeDeadlineSeconds: 7200
backoffLimit: 1

# Trailing days re-fetched every run (Oura revises documents after phone sync).
recentDays: 14
hrChunkDays: 7
pageSleepSeconds: "0.25"

# Target database (provision outside the chart).
postgres:
  host: postgres
  port: 5432
  database: oura
  user: oura
  existingSecret: ""
  passwordKey: password

# Prefer a personal access token: https://cloud.ouraring.com/personal-access-tokens
auth:
  mode: pat # pat | oauth
  existingSecret: ""
  patKey: OURA_PAT
  clientIdKey: OURA_CLIENT_ID
  clientSecretKey: OURA_CLIENT_SECRET

# Token PVC when auth.mode=oauth.
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: ""
  size: 1Gi
  mountPath: /token
  tokenFile: oauth_token.json

# Historical catch-up Job (delete/recreate to re-run).
backfill:
  enabled: false
  startDate: "2015-01-01"
  activeDeadlineSeconds: 21600
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

extraEnv: {}

# Optional Grafana sidecar dashboard (kube-prometheus-stack label grafana_dashboard=1).
dashboard:
  enabled: false
  labels:
    grafana_dashboard: "1"
  datasourceUid: oura-postgres

nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
