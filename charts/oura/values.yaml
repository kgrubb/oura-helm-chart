# Default values for the oura chart.

quickstart:
  enabled: false  # create Secrets from values and enable bootstrap, dashboard, datasource

image:
  repository: ghcr.io/kgrubb/oura-collector
  tag: ""  # defaults to Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

schedule: "*/15 * * * *"
timeZone: UTC
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 2
failedJobsHistoryLimit: 3
activeDeadlineSeconds: 7200
backoffLimit: 1

recentDays: 14
hrChunkDays: 7
pageSleepSeconds: "0.25"

postgres:
  host: postgres
  port: 5432
  database: oura
  user: oura
  existingSecret: ""
  passwordKey: password
  password: ""  # used if existingSecret is unset
  passwordRo: ""  # read-only role password if existingSecret is unset
  bootstrap:
    enabled: false
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    admin:
      user: postgres
      existingSecret: ""
      passwordKey: password
      password: ""  # used if admin.existingSecret is unset
    readOnlyUser: ""  # e.g. oura_ro. Quickstart defaults to oura_ro. Requires that key in the DB Secret.
    readOnlyPasswordKey: password-ro
    sslMode: prefer
    ttlSecondsAfterFinished: 86400
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

# https://cloud.ouraring.com/personal-access-tokens
auth:
  mode: pat  # pat | oauth
  existingSecret: ""
  patKey: OURA_PAT
  pat: ""  # used if existingSecret is unset and mode=pat
  clientIdKey: OURA_CLIENT_ID
  clientSecretKey: OURA_CLIENT_SECRET

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: ""
  size: 1Gi
  mountPath: /token
  tokenFile: oauth_token.json

backfill:
  enabled: false
  startDate: "2015-01-01"
  activeDeadlineSeconds: 21600
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

extraEnv: {}

dashboard:
  enabled: false
  createDatasource: false
  labels:
    grafana_dashboard: "1"
  datasourceUid: oura-postgres
  datasource:
    labels:
      grafana_datasource: "1"
    name: Oura Postgres
    user: ""
    existingSecret: ""
    passwordKey: ""
    password: ""
    sslMode: disable
    postgresVersion: 1500

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
