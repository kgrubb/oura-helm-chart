name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  packages: write
  pull-requests: read

env:
  IMAGE_NAME: oura-collector
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true

      - name: Detect release
        id: bump
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          MSG=$(git log -1 --format=%s "$AFTER")
          last_tag=$(git tag -l 'oura-*' --sort=-v:refname | head -1 || true)
          first_release=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "$last_tag" ]]; then
              first_release=true
            else
              BEFORE="$last_tag"
            fi
          elif [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            [[ -n "$last_tag" ]] && exit 0
            first_release=true
          fi

          [[ "$MSG" =~ ^chore\(release\): ]] && exit 0

          chmod +x scripts/*.sh

          release_paths=(charts/ src/ Dockerfile pyproject.toml uv.lock)
          if [[ "$first_release" == "true" ]] || [[ -z "$last_tag" ]]; then
            echo "First chart publish"
          else
            git diff --name-only "$last_tag" "$AFTER" -- "${release_paths[@]}" | grep -q . || exit 0
            ./scripts/bump-chart-version.sh "$BEFORE" "$AFTER"
          fi

          version=$(awk '/^version:/ { print $2; exit }' charts/oura/Chart.yaml)
          ./scripts/versions.sh set "$version"

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "release=true"
            echo "since_ref=${last_tag:-$AFTER}"
            echo "version=${version}"
            echo "image=${REGISTRY}/${owner}/${IMAGE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/generate-changelog.sh \
            "${{ steps.bump.outputs.since_ref }}" \
            "${{ github.sha }}" \
            "${{ steps.bump.outputs.version }}"

      - name: Set up Docker Buildx
        if: steps.bump.outputs.release == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.bump.outputs.release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        if: steps.bump.outputs.release == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.bump.outputs.image }}
          tags: |
            type=raw,value=${{ steps.bump.outputs.version }}
            type=raw,value=latest

      - name: Build and push collector image
        if: steps.bump.outputs.release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.bump.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Make collector package public
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # New packages default to private. Chart consumers need anonymous pulls.
          owner="${{ github.repository_owner }}"
          name="${IMAGE_NAME}"
          set_public() {
            local path="$1"
            gh api --method PUT \
              -H "Accept: application/vnd.github+json" \
              "${path}" \
              -f visibility=public
          }
          if ! set_public "/user/packages/container/${name}/visibility"; then
            set_public "/orgs/${owner}/packages/container/${name}/visibility"
          fi
          visibility=""
          if visibility=$(gh api -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${name}" --jq .visibility 2>/dev/null); then
            :
          else
            visibility=$(gh api -H "Accept: application/vnd.github+json" \
              "/orgs/${owner}/packages/container/${name}" --jq .visibility)
          fi
          if [[ "${visibility}" != "public" ]]; then
            echo "collector package visibility is '${visibility}', expected public" >&2
            echo "make ghcr.io/${owner}/${name} public, then re-run release" >&2
            exit 1
          fi
          echo "collector package is public"

      - uses: azure/setup-helm@v5
        if: steps.bump.outputs.release == 'true'
        with:
          version: v4.2.3

      - name: Import GPG key
        id: gpg
        if: steps.bump.outputs.release == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "GPG_PRIVATE_KEY unset, publishing unsigned packages"
            exit 0
          fi
          gpg_dir="$RUNNER_TEMP/gpg"
          mkdir -p "$gpg_dir"
          chmod 700 "$gpg_dir"
          export GNUPGHOME="$gpg_dir"
          echo "GNUPGHOME=$gpg_dir" >> "$GITHUB_ENV"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          fpr=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          [[ -n "$fpr" ]]
          gpg --export-secret-keys "$fpr" > "$gpg_dir/secring.gpg"
          test -s "$gpg_dir/secring.gpg"
          printf '\n' > "$gpg_dir/passphrase"
          echo "CR_KEYRING=$gpg_dir/secring.gpg" >> "$GITHUB_ENV"
          echo "CR_PASSPHRASE_FILE=$gpg_dir/passphrase" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Ensure gh-pages branch
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            exit 0
          fi
          work=$(mktemp -d)
          cp -a pages/. "$work/"
          printf 'apiVersion: v1\nentries: {}\ngenerated: "%s"\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$work/index.yaml"
          git -C "$work" init -b gh-pages
          git -C "$work" config user.name "github-actions[bot]"
          git -C "$work" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$work" add -A
          git -C "$work" commit -m "chore: initialize gh-pages"
          git -C "$work" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$work" push -u origin gh-pages

      - name: Verify versions
        if: steps.bump.outputs.release == 'true'
        run: ./scripts/versions.sh check

      - name: Publish charts
        if: steps.bump.outputs.release == 'true'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: cr.yaml
          packages_with_index: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GNUPGHOME: ${{ env.GNUPGHOME }}
          CR_SIGN: ${{ steps.gpg.outputs.signed }}
          CR_KEY: 8471701+kgrubb@users.noreply.github.com
          CR_KEYRING: ${{ env.CR_KEYRING }}
          CR_PASSPHRASE_FILE: ${{ env.CR_PASSPHRASE_FILE }}

      - name: Sync gh-pages assets
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/sync-gh-pages.sh static

      - name: Commit release artifacts
        if: steps.bump.outputs.release == 'true'
        run: |
          git add CHANGELOG.md charts/oura/Chart.yaml pyproject.toml uv.lock
          git diff --staged --quiet && exit 0
          git commit -m "chore(release): bump chart to ${{ steps.bump.outputs.version }}"
          git push
