name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  chart:
    name: Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v4.2.3

      - name: Lint and test
        run: |
          chmod +x scripts/*.sh
          pipx install yamllint
          yamllint .
          shellcheck scripts/*.sh
          ./scripts/versions.sh check
          helm lint charts/oura --strict -f ci/values.yaml
          helm lint charts/oura --strict -f ci/values-quickstart.yaml
          helm plugin install https://github.com/helm-unittest/helm-unittest \
            --version v1.1.0 --verify=false
          helm unittest charts/oura
          mkdir -p rendered
          helm template ci charts/oura -f ci/values.yaml > rendered/manifests.yaml
          helm template ci charts/oura -f ci/values-quickstart.yaml > rendered/quickstart.yaml

      - name: Kube-linter
        uses: stackrox/kube-linter-action@v1
        with:
          directory: rendered
          config: .kube-linter.yaml

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv sync --locked --group dev
      - run: uv run ruff check src tests && uv run ruff format --check src tests && uv run pytest

  image:
    name: Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: oura-collector:ci
          build-args: VERSION=0.0.0-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
