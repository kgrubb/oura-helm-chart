name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Lint YAML
        run: |
          pipx install yamllint
          yamllint .

      - name: Shellcheck
        run: shellcheck scripts/*.sh

      - name: Lint chart
        run: |
          helm lint charts/oura --strict -f ci/values.yaml
          helm lint charts/oura --strict -f ci/values.yaml --set dashboard.enabled=true

      - name: Render chart
        run: |
          helm template test charts/oura -f ci/values.yaml
          helm template test charts/oura -f ci/values.yaml \
            --set auth.mode=oauth \
            --set persistence.storageClass=standard
          helm template test charts/oura -f ci/values.yaml \
            --set backfill.enabled=true \
            --set backfill.startDate=2020-01-01
          helm template test charts/oura -f ci/values.yaml \
            --set dashboard.enabled=true

      - name: Unit tests
        run: python3 tests/test_symptom_radar.py

      - name: Lint manifests
        uses: stackrox/kube-linter-action@v1
        with:
          directory: charts/oura
          config: .kube-linter.yaml
